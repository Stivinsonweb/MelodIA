<div class="rounded-2xl p-5 mb-0 border"
  style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1);">

  <div class="flex items-center gap-2 mb-4">
    <div class="w-2 h-2 rounded-full" style="background: #c084fc;"></div>
    <span class="text-xs uppercase tracking-widest" style="color: rgba(255,255,255,0.35);">
      Historial de canciones
    </span>
  </div>

  <!-- Sin sesión -->
  <div *ngIf="!isLoggedIn"
    class="flex flex-col items-center justify-center py-8 gap-3 rounded-xl border"
    style="border-color: rgba(255,255,255,0.08); background: rgba(255,255,255,0.02);">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    <p class="text-sm" style="color: rgba(255,255,255,0.3);">
      Inicia sesión para ver tu historial
    </p>
  </div>

  <!-- Con sesión -->
  <div *ngIf="isLoggedIn" class="grid grid-cols-3 gap-3">
    <div *ngFor="let item of history"
      class="rounded-xl p-3 cursor-pointer border transition-all"
      style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.08);"
      (mouseenter)="onHover($event, true)"
      (mouseleave)="onHover($event, false)">
      <div class="text-xs uppercase tracking-wider mb-1"
        style="color: rgba(192,132,252,0.7);">
        {{item.mood}}
      </div>
      <div class="text-xs mb-1"
        style="color: rgba(255,255,255,0.6);">
        {{item.title}}
      </div>
      <div class="text-xs"
        style="color: rgba(255,255,255,0.25);">
        {{item.date}}
      </div>
    </div>
  </div>

</div>
