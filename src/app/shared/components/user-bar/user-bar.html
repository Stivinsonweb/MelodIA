<div class="flex items-center justify-center gap-5 mb-7 px-7 py-4 rounded-2xl border"
  style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);">

  <!-- Avatar principal -->
  <div class="w-14 h-14 rounded-full flex items-center justify-center border-2 cursor-pointer flex-shrink-0"
    style="background: linear-gradient(135deg, #7c3aed, #4f46e5); border-color: rgba(192,132,252,0.4);">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5">
      <path *ngIf="selectedIndex === 0" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
      <ng-container *ngIf="selectedIndex === 1">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M8 22h8"/>
      </ng-container>
      <ng-container *ngIf="selectedIndex === 2">
        <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
      </ng-container>
      <polygon *ngIf="selectedIndex === 3" points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      <path *ngIf="selectedIndex === 4" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      <polygon *ngIf="selectedIndex === 5" points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
    </svg>
  </div>

  <!-- Selector de avatares -->
  <div class="flex gap-2">
    <div (click)="selectAvatar(0)" class="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer border-2 transition-all"
      [style]="selectedIndex === 0 ? 'border-color: #c084fc; background: rgba(192,132,252,0.12)' : 'border-color: transparent; background: rgba(255,255,255,0.07)'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(192,132,252,0.8)" stroke-width="1.5">
        <path d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2z"/>
      </svg>
    </div>
    <div (click)="selectAvatar(1)" class="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer border-2 transition-all"
      [style]="selectedIndex === 1 ? 'border-color: #c084fc; background: rgba(192,132,252,0.12)' : 'border-color: transparent; background: rgba(255,255,255,0.07)'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(192,132,252,0.8)" stroke-width="1.5">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M8 22h8"/>
      </svg>
    </div>
    <div (click)="selectAvatar(2)" class="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer border-2 transition-all"
      [style]="selectedIndex === 2 ? 'border-color: #c084fc; background: rgba(192,132,252,0.12)' : 'border-color: transparent; background: rgba(255,255,255,0.07)'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(192,132,252,0.8)" stroke-width="1.5">
        <path d="M3 18v-6a9 9 0 0 1 18 0v6"/>
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
      </svg>
    </div>
    <div (click)="selectAvatar(3)" class="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer border-2 transition-all"
      [style]="selectedIndex === 3 ? 'border-color: #c084fc; background: rgba(192,132,252,0.12)' : 'border-color: transparent; background: rgba(255,255,255,0.07)'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(192,132,252,0.8)" stroke-width="1.5">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
    </div>
    <div (click)="selectAvatar(4)" class="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer border-2 transition-all"
      [style]="selectedIndex === 4 ? 'border-color: #c084fc; background: rgba(192,132,252,0.12)' : 'border-color: transparent; background: rgba(255,255,255,0.07)'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(192,132,252,0.8)" stroke-width="1.5">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    </div>
    <div (click)="selectAvatar(5)" class="w-10 h-10 rounded-full flex items-center justify-center cursor-pointer border-2 transition-all"
      [style]="selectedIndex === 5 ? 'border-color: #c084fc; background: rgba(192,132,252,0.12)' : 'border-color: transparent; background: rgba(255,255,255,0.07)'">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(192,132,252,0.8)" stroke-width="1.5">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
  </div>

  <!-- Apodo -->
  <div class="flex flex-col gap-1">
    <label class="text-xs uppercase tracking-widest" style="color: rgba(255,255,255,0.4);">Tu apodo</label>
    <div class="flex items-center gap-2">
      <div class="flex items-center rounded-lg overflow-hidden border"
        style="background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); width: 180px;">
        <span class="px-3 text-sm border-r flex items-center h-9"
          style="color: rgba(192,132,252,0.6); border-color: rgba(255,255,255,0.1); background: rgba(192,132,252,0.07);">@</span>
        <input type="text" placeholder="MusicLover99"
          [(ngModel)]="apodo"
          class="bg-transparent border-none outline-none text-sm px-3 flex-1"
          style="color: white;" />
      </div>
      <button (click)="guardarApodo()"
        class="px-3 h-9 rounded-lg text-xs font-medium cursor-pointer border-none transition-all"
        style="background: rgba(192,132,252,0.2); color: #c084fc; border: 0.5px solid rgba(192,132,252,0.4);">
        {{ guardado ? '✓' : 'Guardar' }}
      </button>
    </div>

    <!-- Alerta -->
    <div *ngIf="alertaMensaje"
      class="text-xs px-3 py-1 rounded-lg mt-1"
      [style]="alertaTipo === 'success' ?
        'background: rgba(16,185,129,0.15); color: rgba(16,185,129,0.9);' :
        'background: rgba(239,68,68,0.15); color: rgba(239,68,68,0.9);'">
      {{ alertaMensaje }}
    </div>
  </div>
</div>
