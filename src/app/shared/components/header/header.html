<div class="text-center mb-7">
  <div class="text-4xl font-medium tracking-widest mb-1" style="color: #c084fc;">
    Melod<span style="color: #818cf8;">IA</span>
  </div>
  <div class="text-sm mb-4" style="color: rgba(255,255,255,0.4);">
    Convierte tus emociones en canciones con inteligencia artificial
  </div>

  <div class="flex items-center justify-center gap-3">

    <!-- Sin sesión -->
    <button *ngIf="!user"
      (click)="loginWithGoogle()"
      class="flex items-center gap-3 px-5 py-2 rounded-xl border cursor-pointer transition-all"
      style="background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); color: white;">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      <span class="text-sm font-medium">Iniciar sesión con Google</span>
    </button>

    <!-- Con sesión -->
    <div *ngIf="user" class="flex items-center gap-3">
      <img [src]="user.picture" class="w-9 h-9 rounded-full border-2" style="border-color: #c084fc;" />
      <div class="flex flex-col items-start">
        <span class="text-sm font-medium" style="color: rgba(255,255,255,0.9);">{{ user.name }}</span>
        <span *ngIf="user.apodo" class="text-xs" style="color: rgba(192,132,252,0.7);">@{{ user.apodo }}</span>
      </div>
      <button
        (click)="logout()"
        class="px-3 py-1 rounded-lg text-xs border cursor-pointer transition-all"
        style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: rgba(255,255,255,0.5);">
        Cerrar sesión
      </button>
    </div>

  </div>
</div>
