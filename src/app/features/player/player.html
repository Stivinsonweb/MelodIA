<div class="rounded-2xl p-5 border"
  style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1);">

  <div class="flex items-center gap-2 mb-4">
    <div class="w-2 h-2 rounded-full" style="background: #818cf8;"></div>
    <span class="text-xs uppercase tracking-widest" style="color: rgba(255,255,255,0.35);">
      Tu canción generada
    </span>
  </div>

  <div class="rounded-xl p-4 mb-3 border overflow-y-auto"
    style="background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); height: 150px;">
    <div *ngFor="let line of lyrics"
      class="text-sm leading-loose"
      [style]="line.active ?
        'color: #c084fc; font-weight: 500;' :
        'color: rgba(255,255,255,0.7);'">
      {{line.text}}
    </div>
  </div>

  <div class="rounded-xl p-3 mb-3 border"
    style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1);">
    <div class="flex items-center gap-3">
      <button
        (click)="togglePlay()"
        class="w-9 h-9 rounded-full flex items-center justify-center cursor-pointer border flex-shrink-0"
        style="background: rgba(192,132,252,0.2); border-color: rgba(192,132,252,0.4); color: #c084fc;">
        <svg *ngIf="!isPlaying" width="12" height="12" viewBox="0 0 24 24" fill="#c084fc">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        <svg *ngIf="isPlaying" width="12" height="12" viewBox="0 0 24 24" fill="#c084fc">
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </svg>
      </button>

      <div class="flex-1">
        <div class="rounded-full overflow-hidden mb-1" style="height: 3px; background: rgba(255,255,255,0.1);">
          <div class="h-full rounded-full" style="width: 35%; background: linear-gradient(90deg, #7c3aed, #c084fc);"></div>
        </div>
        <div class="text-xs" style="color: rgba(255,255,255,0.3);">1:12 / 3:24</div>
      </div>
    </div>
  </div>

  <button class="w-full py-2 rounded-xl text-sm cursor-pointer border transition-all"
    style="background: transparent; border-color: rgba(192,132,252,0.35); color: rgba(192,132,252,0.8);">
    Descargar letra (.txt) y audio (.mp3)
  </button>

</div>
