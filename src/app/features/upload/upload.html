<div class="rounded-2xl p-5 border"
  style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1);">

  <div class="flex items-center gap-2 mb-4">
    <div class="w-2 h-2 rounded-full" style="background: #c084fc;"></div>
    <span class="text-xs uppercase tracking-widest" style="color: rgba(255,255,255,0.35);">
      Cuéntame cómo te sientes
    </span>
  </div>

  <!-- Alerta error -->
  <div *ngIf="errorMensaje"
    class="flex items-center gap-2 px-4 py-3 rounded-xl mb-3 text-sm"
    style="background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: rgba(239,68,68,0.9);">
    {{ errorMensaje }}
  </div>

  <!-- Alerta éxito -->
  <div *ngIf="exitoMensaje"
    class="flex items-center gap-2 px-4 py-3 rounded-xl mb-3 text-sm"
    style="background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: rgba(16,185,129,0.9);">
    {{ exitoMensaje }}
  </div>

  <!-- Texto -->
  <textarea
    [(ngModel)]="texto"
    class="w-full rounded-xl text-sm p-3 resize-none outline-none border mb-4"
    rows="5"
    placeholder="Describe tu estado de ánimo... ej: me siento nostálgico pensando en el verano pasado"
    style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); color: white; height: 120px;">
  </textarea>

  <!-- Botón -->
  <button
    (click)="generarCancion()"
    [disabled]="cargando"
    class="w-full py-3 rounded-xl text-sm font-medium text-white border-none transition-all"
    [class.opacity-50]="cargando"
    style="background: linear-gradient(135deg, #7c3aed, #4f46e5); cursor: pointer;">
    <span *ngIf="!cargando">✨ Generar mi canción</span>
    <span *ngIf="cargando" class="flex items-center justify-center gap-2">
      <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
      </svg>
      Generando tu canción...
    </span>
  </button>

  <!-- Aviso sin sesión -->
  <p *ngIf="!isLoggedIn" class="text-xs text-center mt-3" style="color: rgba(255,255,255,0.25);">
    💡 Inicia sesión para guardar tu historial y generar música
  </p>

</div>
