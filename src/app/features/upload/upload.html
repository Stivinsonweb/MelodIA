<div class="rounded-2xl p-5 border"
  style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1);">

  <div class="flex items-center gap-2 mb-4">
    <div class="w-2 h-2 rounded-full" style="background: #c084fc;"></div>
    <span class="text-xs uppercase tracking-widest" style="color: rgba(255,255,255,0.35);">
      Cuéntame cómo te sientes
    </span>
  </div>

  <!-- Texto -->
  <div class="mb-3">
    <textarea
      [(ngModel)]="texto"
      (ngModelChange)="onTextoChange()"
      [disabled]="modo === 'imagen'"
      class="w-full rounded-xl text-sm p-3 resize-none outline-none border transition-all"
      rows="4"
      placeholder="Describe tu estado de ánimo... ej: me siento nostálgico pensando en el verano pasado"
      [style]="modo === 'imagen' ?
        'background: rgba(255,255,255,0.02); border-color: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); height: 90px; cursor: not-allowed;' :
        'background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); color: white; height: 90px;'">
    </textarea>
    <p *ngIf="modo === 'imagen'" class="text-xs mt-1" style="color: rgba(192,132,252,0.6);">
      ⚠️ Quita la imagen para escribir texto
    </p>
  </div>

  <!-- Separador -->
  <div class="flex items-center gap-3 mb-3">
    <div class="flex-1 h-px" style="background: rgba(255,255,255,0.08);"></div>
    <span class="text-xs" style="color: rgba(255,255,255,0.25);">o</span>
    <div class="flex-1 h-px" style="background: rgba(255,255,255,0.08);"></div>
  </div>

  <!-- Upload imagen -->
  <div class="mb-3">
    <div *ngIf="!imagenBase64">
      <label
        [class]="modo === 'texto' ? 'opacity-40 cursor-not-allowed' : 'cursor-pointer'"
        class="rounded-xl p-4 text-center border-2 border-dashed transition-all block"
        [style]="modo === 'texto' ?
          'border-color: rgba(255,255,255,0.08);' :
          'border-color: rgba(255,255,255,0.15);'">
        <input
          type="file"
          accept="image/*"
          class="hidden"
          [disabled]="modo === 'texto'"
          (change)="onImagenSeleccionada($event)" />
        <svg class="mx-auto mb-2 opacity-40" width="28" height="28" viewBox="0 0 24 24"
          fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p class="text-xs" style="color: rgba(255,255,255,0.3);">
          Sube una imagen que represente tu mood
        </p>
        <p class="text-xs mt-1" style="color: rgba(255,255,255,0.2);">PNG, JPG hasta 5MB</p>
        <p *ngIf="modo === 'texto'" class="text-xs mt-1" style="color: rgba(192,132,252,0.6);">
          ⚠️ Borra el texto para subir una imagen
        </p>
      </label>
    </div>

    <!-- Imagen cargada -->
    <div *ngIf="imagenBase64"
      class="flex items-center justify-between px-4 py-3 rounded-xl border"
      style="background: rgba(192,132,252,0.08); border-color: rgba(192,132,252,0.3);">
      <div class="flex items-center gap-2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#c084fc" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <span class="text-xs" style="color: rgba(192,132,252,0.8);">{{ imagenNombre }}</span>
      </div>
      <button (click)="limpiarImagen()"
        class="text-xs px-2 py-1 rounded-lg cursor-pointer border-none"
        style="background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5);">
        ✕ Quitar
      </button>
    </div>
  </div>

  <!-- Moods -->
  <div class="flex flex-wrap gap-2 mb-4">
    <span *ngFor="let mood of moods"
      (click)="selectMood(mood)"
      class="px-3 py-1 rounded-full text-xs cursor-pointer border transition-all"
      [style]="selectedMood === mood ?
        'background: rgba(192,132,252,0.2); border-color: rgba(192,132,252,0.5); color: #c084fc;' :
        'background: rgba(192,132,252,0.1); border-color: rgba(192,132,252,0.25); color: rgba(192,132,252,0.8);'">
      {{mood}}
    </span>
  </div>

  <!-- Botón -->
  <button
    (click)="generarCancion()"
    [disabled]="cargando"
    class="w-full py-3 rounded-xl text-sm font-medium text-white border-none transition-all"
    [style]="cargando ?
      'background: rgba(124,58,237,0.5); cursor: not-allowed;' :
      'background: linear-gradient(135deg, #7c3aed, #4f46e5); cursor: pointer;'">
    <span *ngIf="!cargando">Generar mi canción</span>
    <span *ngIf="cargando" class="flex items-center justify-center gap-2">
      <svg class="animate-spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
      </svg>
      Generando tu canción...
    </span>
  </button>

</div>
