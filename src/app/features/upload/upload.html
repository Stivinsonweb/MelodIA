<div class="rounded-2xl p-5 border"
  style="background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.1);">

  <div class="flex items-center gap-2 mb-4">
    <div class="w-2 h-2 rounded-full" style="background: #c084fc;"></div>
    <span class="text-xs uppercase tracking-widest" style="color: rgba(255,255,255,0.35);">
      Cuéntame cómo te sientes
    </span>
  </div>

  <textarea
    class="w-full rounded-xl text-sm p-3 resize-none outline-none mb-3 border"
    rows="4"
    placeholder="Describe tu estado de ánimo... ej: me siento nostálgico pensando en el verano pasado"
    style="background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); color: white; height: 90px;">
  </textarea>

  <div class="rounded-xl p-4 text-center cursor-pointer mb-3 border-2 border-dashed transition-all"
    style="border-color: rgba(255,255,255,0.15);"
    (mouseenter)="onHoverUpload(true)"
    (mouseleave)="onHoverUpload(false)">
    <svg class="mx-auto mb-2 opacity-40" width="28" height="28" viewBox="0 0 24 24"
      fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
    <p class="text-xs" style="color: rgba(255,255,255,0.3);">
      O sube una imagen que represente tu mood
    </p>
    <p class="text-xs mt-1" style="color: rgba(255,255,255,0.2);">
      PNG, JPG hasta 5MB
    </p>
  </div>

  <div class="flex flex-wrap gap-2 mb-4">
    <span *ngFor="let mood of moods"
      (click)="selectMood(mood)"
      class="px-3 py-1 rounded-full text-xs cursor-pointer border transition-all"
      [style]="selectedMood === mood ?
        'background: rgba(192,132,252,0.2); border-color: rgba(192,132,252,0.5); color: #c084fc;' :
        'background: rgba(192,132,252,0.1); border-color: rgba(192,132,252,0.25); color: rgba(192,132,252,0.8);'">
      {{mood}}
    </span>
  </div>

  <button class="w-full py-3 rounded-xl text-sm font-medium text-white cursor-pointer border-none"
    style="background: linear-gradient(135deg, #7c3aed, #4f46e5);">
    Generar mi canción
  </button>

</div>
